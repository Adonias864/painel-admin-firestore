<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE PLUS Streaming - Painel Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c111d;
            --card-bg: #1a2236;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #f59e0b; /* Laranja Firestore */
            --primary-hover: #d97706;
            --accent: #ff743d; /* Coral Firestore */
            --success: #10b981;
            --error: #ef4444;
            --border: #2e3b56;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background-color: #0c111d;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        input:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #0c111d;
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover { opacity: 0.9; }

        button.btn-logout {
            background: #2e3b56;
            color: var(--text-color);
            border: 1px solid var(--border);
            padding: 12px;
        }
        button.btn-logout:hover { background: #3d4f74; color: var(--error); }

        button.btn-secondary {
            background: #2e3b56;
            color: var(--text-color);
            border: 1px solid var(--border);
        }

        /* Estilos do Modal (Popup) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 17, 29, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 20px; padding: 5px;
        }
        .modal-close:hover { color: var(--error); }

        #message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        #message.success { display: block; background: rgba(16, 185, 129, 0.1); color: var(--success); }
        #message.error { display: block; background: rgba(239, 68, 68, 0.1); color: var(--error); }

        /* Lista de Dispositivos */
        .user-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-card {
            background: #0c111d;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info { display: flex; flex-direction: column; gap: 4px; }
        .user-id { font-weight: 700; color: var(--primary); font-size: 14px; }
        .user-details { font-size: 12px; color: var(--text-muted); word-break: break-all; }
        .user-actions { display: flex; gap: 8px; }

        .btn-icon {
            background: #2e3b56; border: none; color: var(--text-color);
            padding: 8px; border-radius: 6px; cursor: pointer;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
        }
        .btn-icon:hover { background: #3d4f74; }
        .btn-edit:hover { color: var(--primary); }
        .btn-delete:hover { color: var(--error); }

        #loadingSection { text-align: center; padding: 40px 0; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: var(--primary);
            animation: spin 1s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="loadingSection">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 14px;">Verificando sessão...</p>
    </div>

    <div id="loginSection" class="hidden">
        <div class="header">
            <h2>FIRE PLUS</h2>
            <p>Painel Administrativo de Streaming</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">E-mail</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="admin@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Sua senha" required>
                </div>
            </div>
            <button type="submit" style="width: 100%;">
                <i class="fa-solid fa-sign-in-alt"></i> Entrar no Painel
            </button>
        </form>
    </div>

    <div id="painelSection" class="hidden">
        <div class="header">
            <h2>FIRE PLUS Streaming</h2>
            <p>Gerenciamento de Dispositivos Ativos</p>
        </div>

        <div class="top-bar">
            <button type="button" class="btn-logout" id="logoutBtn" title="Fazer Logout">
                <i class="fa-solid fa-sign-out-alt"></i> Sair
            </button>
            <button type="button" id="openModalBtn">
                <i class="fa-solid fa-user-plus"></i> CADASTRAR USUÁRIO
            </button>
        </div>

        <div class="user-list" id="userListContainer">
            </div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <button class="modal-close" id="closeModalBtn">&times;</button>
        <div class="header" style="margin-bottom: 20px;">
            <h2 id="modalTitle" style="font-size: 22px;">Cadastrar Usuário</h2>
            <p id="modalSubtitle">Vincule as credenciais ao ID do dispositivo</p>
        </div>

        <form id="cadastroForm">
            <div class="form-group">
                <label for="docId">ID do Aparelho (Cliente)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-tv"></i>
                    <input type="text" id="docId" placeholder="Ex: 234623864" required>
                </div>
            </div>

            <div class="form-group">
                <label for="dnsValue">URL do Servidor (DNS)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-server"></i>
                    <input type="url" id="dnsValue" placeholder="http://exemplo.com:8080" required>
                </div>
            </div>

            <div class="form-group">
                <label for="userValue">Usuário</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="userValue" placeholder="Digite o usuário" required>
                </div>
            </div>

            <div class="form-group">
                <label for="passValue">Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="passValue" placeholder="Digite a senha" required>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="button" class="btn-secondary" id="cancelBtn" style="flex:1;">Cancelar</button>
                <button type="submit" id="submitBtn" style="flex:2;">Salvar</button>
            </div>
        </form>

        <div id="message"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjv_fqiy5C75ivPCHyr8FIxS99l5UCQ_E",
        authDomain: "fire-plus-streaming-app.firebaseapp.com",
        projectId: "fire-plus-streaming-app",
        storageBucket: "fire-plus-streaming-app.firebasestorage.app",
        messagingSenderId: "188055190455",
        appId: "1:188055190455:web:d5110a77ce57f1aa9ac632"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const loadingSection = document.getElementById('loadingSection');
    const loginSection = document.getElementById('loginSection');
    const painelSection = document.getElementById('painelSection');
    const loginForm = document.getElementById('loginForm');
    const cadastroForm = document.getElementById('cadastroForm');
    const messageDiv = document.getElementById('message');
    const logoutBtn = document.getElementById('logoutBtn');
    const userListContainer = document.getElementById('userListContainer');
    
    // Elementos do Modal
    const modalOverlay = document.getElementById('modalOverlay');
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const docIdInput = document.getElementById('docId');
    const submitBtn = document.getElementById('submitBtn');

    let isEditing = false;
    let unsubscribeSnapshot = null;

    function showTimedMessage(text, type) {
        messageDiv.style.display = "block";
        messageDiv.className = type;
        messageDiv.textContent = text;
        setTimeout(() => {
            messageDiv.style.display = "none";
            messageDiv.className = "";
            messageDiv.textContent = "";
        }, 4000);
    }

    // Controle de abertura e fechamento do Modal
    function openModal() { modalOverlay.classList.add('active'); }
    function closeModal() { modalOverlay.classList.remove('active'); resetForm(); }
    
    openModalBtn.addEventListener('click', () => {
        isEditing = false;
        modalTitle.textContent = "Cadastrar Usuário";
        modalSubtitle.textContent = "Vincule as credenciais ao ID do dispositivo";
        docIdInput.disabled = false;
        openModal();
    });
    closeModalBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);

    onAuthStateChanged(auth, (user) => {
        loadingSection.classList.add('hidden');
        if (user) {
            loginSection.classList.add('hidden');
            painelSection.classList.remove('hidden');
            listenToUsers();
        } else {
            loginSection.classList.remove('hidden');
            painelSection.classList.add('hidden');
            closeModal();
            if (unsubscribeSnapshot) unsubscribeSnapshot();
        }
    });

    // Login
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            loginForm.reset();
        } catch (error) {
            alert("E-mail ou senha incorretos.");
        }
    });

    // Enviar (Salvar/Editar)
    cadastroForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const docId = docIdInput.value.trim();
        const dnsValue = document.getElementById('dnsValue').value.trim();
        const userValue = document.getElementById('userValue').value.trim();
        const passValue = document.getElementById('passValue').value.trim();
        
        try {
            await setDoc(doc(db, "clientes", docId), {
                id: docId,
                dns: dnsValue,
                username: userValue,
                password: passValue,
                vinculadoEm: new Date()
            });

            showTimedMessage(isEditing ? "Cadastro atualizado com sucesso!" : "Aparelho ativado com sucesso!", "success");
            setTimeout(closeModal, 1000);
        } catch (error) {
            showTimedMessage("Erro ao salvar os dados.", "error");
        }
    });

    // Listagem em tempo real
    function listenToUsers() {
        unsubscribeSnapshot = onSnapshot(collection(db, "clientes"), (snapshot) => {
            userListContainer.innerHTML = "";
            if(snapshot.empty) {
                userListContainer.innerHTML = `<p style="color: var(--text-muted); font-size:13px; text-align:center; padding: 20px;">Nenhum dispositivo ativado ainda.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="user-info">
                        <span class="user-id"><i class="fa-solid fa-tv"></i> ID: ${data.id}</span>
                        <span class="user-details">User: ${data.username} | Server: ${data.dns}</span>
                    </div>
                    <div class="user-actions">
                        <button class="btn-icon btn-edit" title="Editar dados" data-id="${data.id}" data-dns="${data.dns}" data-user="${data.username}" data-pass="${data.password}">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn-icon btn-delete" title="Excluir" data-id="${data.id}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                userListContainer.appendChild(card);
            });

            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const b = e.currentTarget;
                    prepararEdicao(b.dataset.id, b.dataset.dns, b.dataset.user, b.dataset.pass);
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.dataset.id;
                    if(confirm(`Deseja mesmo remover o acesso do ID ${id}?`)) {
                        deleteDoc(doc(db, "clientes", id));
                    }
                });
            });
        });
    }

    function prepararEdicao(id, dns, user, pass) {
        isEditing = true;
        docIdInput.value = id;
        docIdInput.disabled = true;
        document.getElementById('dnsValue').value = dns;
        document.getElementById('userValue').value = user;
        document.getElementById('passValue').value = pass;

        modalTitle.textContent = "Editar Credenciais";
        modalSubtitle.textContent = "Modificando o dispositivo ID: " + id;
        openModal();
    }

    function resetForm() {
        cadastroForm.reset();
        docIdInput.disabled = false;
        isEditing = false;
    }

    logoutBtn.addEventListener('click', async () => {
        try {
            loadingSection.classList.remove('hidden');
            painelSection.classList.add('hidden');
            await signOut(auth);
        } catch (error) {
            loadingSection.classList.add('hidden');
            painelSection.classList.remove('hidden');
        }
    });
</script>

</body>
</html>

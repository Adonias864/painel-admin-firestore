<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE PLUS Streaming - Painel Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c111d;
            --card-bg: #1a2236;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #f59e0b; /* Laranja Firestore */
            --primary-hover: #d97706;
            --accent: #ff743d; /* Coral Firestore */
            --success: #10b981;
            --error: #ef4444;
            --border: #2e3b56;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 550px;
            border: 1px solid var(--border);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background-color: #0c111d;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        input:disabled {
            background-color: #1e293b;
            color: #64748b;
            cursor: not-allowed;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            flex: 2;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #0c111d;
            font-size: 15px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }

        button.btn-logout {
            flex: 1;
            background: #2e3b56;
            color: var(--text-color);
            border: 1px solid var(--border);
        }

        button.btn-logout:hover {
            background: #3d4f74;
            color: var(--error);
        }

        #message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        #message.success { display: block; background: rgba(16, 185, 129, 0.1); color: var(--success); }
        #message.error { display: block; background: rgba(239, 68, 68, 0.1); color: var(--error); }

        /* Lista de Usuários */
        .users-section {
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        .users-section h3 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #e2e8f0;
        }

        .user-list {
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
        }

        .user-card {
            background: #0c111d;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .user-id {
            font-weight: 700;
            color: var(--primary);
            font-size: 14px;
        }

        .user-details {
            font-size: 12px;
            color: var(--text-muted);
            word-break: break-all;
        }

        .user-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            background: #2e3b56;
            border: none;
            color: var(--text-color);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover { background: #3d4f74; }
        .btn-edit:hover { color: var(--primary); }
        .btn-delete:hover { color: var(--error); }

        /* Loading */
        #loadingSection { text-align: center; padding: 40px 0; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="loadingSection">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 14px;">Verificando sessão...</p>
    </div>

    <div id="loginSection" class="hidden">
        <div class="header">
            <h2>FIRE PLUS</h2>
            <p>Painel Administrativo de Streaming</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">E-mail</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="admin@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Sua senha" required>
                </div>
            </div>
            <button type="submit" style="width: 100%;">
                <i class="fa-solid fa-sign-in-alt"></i> Entrar no Painel
            </button>
        </form>
    </div>

    <div id="painelSection" class="hidden">
        <div class="header">
            <h2>FIRE PLUS Streaming</h2>
            <p id="formSubtitle">Vincular ID do App ao Xtream Codes</p>
        </div>

        <form id="cadastroForm">
            <div class="form-group">
                <label for="docId">ID do Aparelho (Cliente)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-tv"></i>
                    <input type="text" id="docId" placeholder="Ex: 234623864" required>
                </div>
            </div>

            <div class="form-group">
                <label for="dnsValue">URL do Servidor (DNS)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-server"></i>
                    <input type="url" id="dnsValue" placeholder="http://exemplo.com:8080" required>
                </div>
            </div>

            <div class="form-group">
                <label for="userValue">Usuário</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="userValue" placeholder="Digite o usuário" required>
                </div>
            </div>

            <div class="form-group">
                <label for="passValue">Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="passValue" placeholder="Digite a senha" required>
                </div>
            </div>

            <div class="actions">
                <button type="button" class="btn-logout" id="logoutBtn" title="Fazer Logout">
                    <i class="fa-solid fa-sign-out-alt"></i> Sair
                </button>
                <button type="submit" id="submitBtn">
                    <i class="fa-solid fa-bolt"></i> Ativar App
                </button>
            </div>
        </form>

        <div id="message"></div>

        <div class="users-section">
            <h3>Dispositivos Ativados</h3>
            <div class="user-list" id="userListContainer">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjv_fqiy5C75ivPCHyr8FIxS99l5UCQ_E",
        authDomain: "fire-plus-streaming-app.firebaseapp.com",
        projectId: "fire-plus-streaming-app",
        storageBucket: "fire-plus-streaming-app.firebasestorage.app",
        messagingSenderId: "188055190455",
        appId: "1:188055190455:web:d5110a77ce57f1aa9ac632"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const loadingSection = document.getElementById('loadingSection');
    const loginSection = document.getElementById('loginSection');
    const painelSection = document.getElementById('painelSection');
    const loginForm = document.getElementById('loginForm');
    const cadastroForm = document.getElementById('cadastroForm');
    const messageDiv = document.getElementById('message');
    const logoutBtn = document.getElementById('logoutBtn');
    const userListContainer = document.getElementById('userListContainer');
    const submitBtn = document.getElementById('submitBtn');
    const formSubtitle = document.getElementById('formSubtitle');
    const docIdInput = document.getElementById('docId');

    let isEditing = false;
    let unsubscribeSnapshot = null;

    // Função auxiliar para exibir mensagem temporária
    function showTimedMessage(text, type) {
        messageDiv.style.display = "block";
        messageDiv.className = type;
        messageDiv.textContent = text;
        
        // Esconde após 4 segundos
        setTimeout(() => {
            messageDiv.style.display = "none";
            messageDiv.className = "";
            messageDiv.textContent = "";
        }, 4000);
    }

    onAuthStateChanged(auth, (user) => {
        loadingSection.classList.add('hidden');

        if (user) {
            loginSection.classList.add('hidden');
            painelSection.classList.remove('hidden');
            listenToUsers(); // Ativa a listagem em tempo real
        } else {
            loginSection.classList.remove('hidden');
            painelSection.classList.add('hidden');
            if (unsubscribeSnapshot) unsubscribeSnapshot();
        }
    });

    // Login
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();

        messageDiv.style.display = "block";
        messageDiv.className = "";
        messageDiv.textContent = "Verificando credenciais...";

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            loginForm.reset();
            messageDiv.style.display = "none";
        } catch (error) {
            showTimedMessage("E-mail ou senha incorretos.", "error");
        }
    });

    // Enviar (Salvar ou Editar)
    cadastroForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const docId = docIdInput.value.trim();
        const dnsValue = document.getElementById('dnsValue').value.trim();
        const userValue = document.getElementById('userValue').value.trim();
        const passValue = document.getElementById('passValue').value.trim();
        
        try {
            await setDoc(doc(db, "clientes", docId), {
                id: docId,
                dns: dnsValue,
                username: userValue,
                password: passValue,
                vinculadoEm: new Date()
            });

            if (isEditing) {
                showTimedMessage("Cadastro atualizado com sucesso!", "success");
                resetForm();
            } else {
                showTimedMessage("Aparelho ativado com sucesso!", "success");
                cadastroForm.reset();
            }
        } catch (error) {
            showTimedMessage("Erro ao salvar os dados.", "error");
        }
    });

    // Escuta em tempo real a coleção de usuários
    function listenToUsers() {
        unsubscribeSnapshot = onSnapshot(collection(db, "clientes"), (snapshot) => {
            userListContainer.innerHTML = "";
            
            if(snapshot.empty) {
                userListContainer.innerHTML = `<p style="color: var(--text-muted); font-size:13px; text-align:center;">Nenhum dispositivo ativado ainda.</p>`;
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                
                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="user-info">
                        <span class="user-id"><i class="fa-solid fa-tv"></i> ID: ${data.id}</span>
                        <span class="user-details">User: ${data.username} | Server: ${data.dns}</span>
                    </div>
                    <div class="user-actions">
                        <button class="btn-icon btn-edit" title="Editar dados" data-id="${data.id}" data-dns="${data.dns}" data-user="${data.username}" data-pass="${data.password}">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn-icon btn-delete" title="Excluir" data-id="${data.id}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                userListContainer.appendChild(card);
            });

            // Configura os botões de ação dinâmica
            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const b = e.currentTarget;
                    prepararEdicao(b.dataset.id, b.dataset.dns, b.dataset.user, b.dataset.pass);
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.dataset.id;
                    if(confirm(`Deseja mesmo remover o acesso do ID ${id}?`)) {
                        deleteDoc(doc(db, "clientes", id));
                        showTimedMessage("Acesso removido com sucesso.", "success");
                    }
                });
            });
        });
    }

    // Prepara os campos para edição bloqueando a alteração do ID
    function prepararEdicao(id, dns, user, pass) {
        isEditing = true;
        docIdInput.value = id;
        docIdInput.disabled = true; // Impede alterar o ID do aparelho
        document.getElementById('dnsValue').value = dns;
        document.getElementById('userValue').value = user;
        document.getElementById('passValue').value = pass;

        formSubtitle.textContent = "Editando credenciais do ID: " + id;
        submitBtn.innerHTML = `<i class="fa-solid fa-save"></i> Salvar Alterações`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        isEditing = false;
        cadastroForm.reset();
        docIdInput.disabled = false;
        formSubtitle.textContent = "Vincular ID do App ao Xtream Codes";
        submitBtn.innerHTML = `<i class="fa-solid fa-bolt"></i> Ativar App`;
    }

    // Logout
    logoutBtn.addEventListener('click', async () => {
        try {
            loadingSection.classList.remove('hidden');
            painelSection.classList.add('hidden');
            resetForm();
            await signOut(auth);
        } catch (error) {
            loadingSection.classList.add('hidden');
            painelSection.classList.remove('hidden');
            alert("Erro ao tentar sair.");
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBLIMArt - Painel Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-color);
            font-size: 14px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            background-color: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        input::placeholder {
            color: #475569;
        }

        .actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        button {
            flex: 2;
            padding: 12px;
            background-color: var(--primary);
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button.btn-logout {
            flex: 1;
            background-color: #334155;
            color: var(--text-color);
            border: 1px solid var(--border);
        }

        button.btn-logout:hover {
            background-color: #475569;
            color: #ef4444;
        }

        #message {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }

        #message.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        #message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Painel de Ativação</h2>
        <p>Vincular ID do App ao Xtream Codes</p>
    </div>

    <form id="cadastroForm">
        <div class="form-group">
            <label for="docId">ID do Aparelho (Cliente)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-tv"></i>
                <input type="text" id="docId" placeholder="Ex: 234623864" required>
            </div>
        </div>

        <div class="form-group">
            <label for="dnsValue">URL do Servidor (DNS)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-server"></i>
                <input type="url" id="dnsValue" placeholder="http://exemplo.com:8080" required>
            </div>
        </div>

        <div class="form-group">
            <label for="userValue">Usuário</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="userValue" placeholder="Digite o usuário" required>
            </div>
        </div>

        <div class="form-group">
            <label for="passValue">Senha</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="passValue" placeholder="Digite a senha" required>
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn-logout" id="logoutBtn" title="Limpar e Sair">
                <i class="fa-solid fa-sign-out-alt"></i> Sair
            </button>
            <button type="submit">
                <i class="fa-solid fa-bolt"></i> Ativar App
            </button>
        </div>
    </form>

    <div id="message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // CONFIGURAÇÕES DO SEU FIREBASE
    const firebaseConfig = {
  apiKey: "AIzaSyDjv_fqiy5C75ivPCHyr8FIxS99l5UCQ_E",
  authDomain: "fire-plus-streaming-app.firebaseapp.com",
  projectId: "fire-plus-streaming-app",
  storageBucket: "fire-plus-streaming-app.firebasestorage.app",
  messagingSenderId: "188055190455",
  appId: "1:188055190455:web:d5110a77ce57f1aa9ac632"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('cadastroForm');
    const messageDiv = document.getElementById('message');
    const logoutBtn = document.getElementById('logoutBtn');

    // Evento de Enviar os Dados
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const docId = document.getElementById('docId').value.trim();
        const dnsValue = document.getElementById('dnsValue').value.trim();
        const userValue = document.getElementById('userValue').value.trim();
        const passValue = document.getElementById('passValue').value.trim();
        
        messageDiv.style.display = "block";
        messageDiv.className = "";
        messageDiv.textContent = "Vinculando aparelho...";

        try {
            await setDoc(doc(db, "clientes", docId), {
                id: docId,
                dns: dnsValue,
                username: userValue,
                password: passValue,
                vinculadoEm: new Date()
            });

            messageDiv.textContent = "Aparelho ativado! O app já pode conectar.";
            messageDiv.className = "success";
            form.reset();
            
        } catch (error) {
            console.error(error);
            messageDiv.textContent = "Erro ao salvar no Firestore.";
            messageDiv.className = "error";
        }
    });

    // Ação do Botão Sair (Limpa tudo)
    logoutBtn.addEventListener('click', () => {
        form.reset();
        messageDiv.style.display = "none";
        messageDiv.textContent = "";
        alert("Painel limpo com sucesso!");
    });
</script>

</body>
</html>

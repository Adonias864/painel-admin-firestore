<form id="cadastroForm">
    <div class="form-group">
        <label for="docId">ID do Cliente (Mac ou Identificador):</label>
        <input type="text" id="docId" placeholder="Ex: cliente_joao" required>
    </div>
    <div class="form-group">
        <label for="dnsValue">URL do Servidor (DNS):</label>
        <input type="url" id="dnsValue" placeholder="http://exemplo.xyz:8080" required>
    </div>
    <div class="form-group">
        <label for="userValue">Usuário:</label>
        <input type="text" id="userValue" placeholder="Digite o usuário" required>
    </div>
    <div class="form-group">
        <label for="passValue">Senha:</label>
        <input type="password" id="passValue" placeholder="Digite a senha" required>
    </div>
    <button type="submit">Salvar no Firestore</button>
</form>

<script type="module">
    // ... (sua inicialização do Firebase continua igual)

    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const docId = document.getElementById('docId').value.trim();
        const dnsValue = document.getElementById('dnsValue').value.trim();
        const userValue = document.getElementById('userValue').value.trim();
        const passValue = document.getElementById('passValue').value.trim();
        const messageDiv = document.getElementById('message');
        
        messageDiv.textContent = "Salvando...";

        try {
            // Salva a estrutura XC no Firestore
            await setDoc(doc(db, "clientes", docId), {
                id: docId,
                dns: dnsValue,
                username: userValue,
                password: passValue,
                atualizadoEm: new Date()
            });

            messageDiv.textContent = "Dados salvos com sucesso!";
            messageDiv.className = "success";
            document.getElementById('cadastroForm').reset();
        } catch (error) {
            messageDiv.textContent = "Erro ao salvar.";
            messageDiv.className = "error";
        }
    });
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE PLUS Streaming - Painel Admin</title>
    
    <link rel="icon" type="image/png" href="logopremium.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0c111d;
            --card-bg: #1a2236;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #f59e0b; /* Laranja Firestore */
            --primary-hover: #d97706;
            --accent: #ff743d; /* Coral Firestore */
            --success: #10b981;
            --error: #ef4444;
            --border: #2e3b56;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;

            /* CONFIGURAÇÃO PARA RESPONSIVIDADE EM SMART TVs E CELULARES */
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            border: 1px solid var(--border);
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
        }

        .login-logo {
            max-width: 86px;
            height: auto;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .painel-logo {
            max-width: 77px;
            height: auto;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .header h2 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i.main-icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }
        .toggle-password:hover {
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 42px;
            background-color: #0c111d;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-color);
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        input:disabled {
            background-color: #111827;
            color: #4b5563;
            cursor: not-allowed;
            border-color: #1f2937;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: #0c111d;
            font-size: 14px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover { opacity: 0.9; }

        button.btn-logout {
            background: #2e3b56;
            color: var(--text-color);
            border: 1px solid var(--border);
            padding: 12px;
        }
        button.btn-logout:hover { background: #3d4f74; color: var(--error); }

        button.btn-secondary {
            background: #2e3b56;
            color: var(--text-color);
            border: 1px solid var(--border);
        }
        button.btn-secondary:hover { background: #3d4f74; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(12, 17, 29, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 20px; padding: 5px;
        }
        .modal-close:hover { color: var(--error); }

        .message-box {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            border-radius: 6px;
            display: none;
        }
        .message-box.success { display: block; background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .message-box.error { display: block; background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .user-list {
            max-height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-card {
            background: #0c111d;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info { display: flex; flex-direction: column; gap: 4px; }
        .user-id { font-weight: 700; color: var(--primary); font-size: 14px; }
        .user-details { font-size: 12px; color: var(--text-muted); word-break: break-all; }
        .user-actions { display: flex; gap: 8px; }

        .btn-icon {
            background: #2e3b56; border: none; color: var(--text-color);
            padding: 8px; border-radius: 6px; cursor: pointer;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
        }
        .btn-icon:hover { background: #3d4f74; }
        .btn-edit:hover { color: var(--primary); }
        .btn-delete:hover { color: var(--error); }

        #loadingSection { text-align: center; padding: 40px 0; }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); width: 40px; height: 40px;
            border-radius: 50%; border-left-color: var(--primary);
            animation: spin 1s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="loadingSection">
        <div class="spinner"></div>
        <p style="color: var(--text-muted); font-size: 14px;">Verificando sessão...</p>
    </div>

    <div id="loginSection" class="hidden">
        <div class="header">
            <img src="logopremium.png" alt="Logo FIRE PLUS" class="login-logo">
            <h2>FIRE PLUS Streaming</h2>
            <p>Painel Administrativo de Streaming</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">E-mail</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope main-icon"></i>
                    <input type="email" id="loginEmail" placeholder="admin@email.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock main-icon"></i>
                    <input type="password" id="loginPassword" placeholder="Sua senha" required>
                </div>
            </div>
            <button type="submit" style="width: 100%;">
                <i class="fa-solid fa-sign-in-alt"></i> Entrar no Painel
            </button>
        </form>
    </div>

    <div id="painelSection" class="hidden">
        <div class="header">
            <img src="logopremium.png" alt="Logo FIRE PLUS" class="painel-logo">
            <h2>FIRE PLUS Streaming</h2>
            <p>Gerenciamento de Dispositivos Ativos</p>
        </div>

        <div class="top-bar">
            <button type="button" class="btn-logout" id="logoutBtn" title="Fazer Logout">
                <i class="fa-solid fa-sign-out-alt"></i> Sair
            </button>
            <button type="button" id="openCadastroModalBtn">
                <i class="fa-solid fa-user-plus"></i> CADASTRAR USUÁRIO
            </button>
        </div>

        <div class="user-list" id="userListContainer">
        </div>
    </div>
</div>

<div class="modal-overlay" id="cadastroModalOverlay">
    <div class="modal-card">
        <button class="modal-close" id="closeCadastroModalBtn">&times;</button>
        <div class="header" style="margin-bottom: 20px;">
            <h2 style="font-size: 22px;">Cadastrar Usuário</h2>
            <p>Vincule as credenciais ao ID do dispositivo</p>
        </div>

        <form id="cadastroForm">
            <div class="form-group">
                <label for="docId">ID do Aparelho (Cliente)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-tv main-icon"></i>
                    <input type="text" id="docId" placeholder="Ex: 234623864" required>
                </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    // Adicionado o 'getDoc' aqui para fazermos a checagem
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // ⚠️ ATENÇÃO: COLE AQUI AS SUAS CREDENCIAIS DO FIREBASE
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "FIRE-PLUS-STREAMING-APP.firebaseapp.com",
        projectId: "fire-plus-streaming-app",
        storageBucket: "fire-plus-streaming-app.appspot.com",
        messagingSenderId: "SEU_MESSAGING_SENDER_ID",
        appId: "SEU_APP_ID"
    };

    // Inicializando Firebase e Serviços
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Mapeamento de Elementos
    const loginScreen = document.getElementById('login-screen');
    const adminScreen = document.getElementById('admin-screen');
    const loginForm = document.getElementById('login-form');
    const adminForm = document.getElementById('admin-form');
    const loginMsg = document.getElementById('login-message');
    const statusMsg = document.getElementById('status-message');
    const btnLogout = document.getElementById('btn-logout');

    // Monitor do estado de autenticação
    onAuthStateChanged(auth, (user) => {
        if (user) {
            loginScreen.classList.add('hidden');
            adminScreen.classList.remove('hidden');
        } else {
            loginScreen.classList.remove('hidden');
            adminScreen.classList.add('hidden');
        }
    });

    // Evento de Login
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        loginMsg.textContent = "Autenticando...";
        loginMsg.className = "";

        try {
            await signInWithEmailAndPassword(auth, email, password);
            loginForm.reset();
        } catch (error) {
            console.error(error);
            loginMsg.textContent = "Erro no login. Verifique e-mail e senha.";
            loginMsg.className = "error";
        }
    });

    // Evento de Logout
    btnLogout.addEventListener('click', () => {
        signOut(auth);
    });

    // Ação Principal: Verificar duplicidade e Gravar na coleção "devices"
    adminForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const deviceId = document.getElementById('doc-id').value.trim();
        const urlM3uValue = document.getElementById('url-m3u').value.trim();

        statusMsg.textContent = "Verificando disponibilidade do ID...";
        statusMsg.className = "";

        try {
            // Cria a referência para o documento que queremos cadastrar
            const docRef = doc(db, "devices", deviceId);
            
            // Faz a busca no banco para ver se ele já existe
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                // Se o ID já existir, interrompe a execução e exibe o aviso
                statusMsg.textContent = `Erro: O ID "${deviceId}" já está cadastrado no sistema!`;
                statusMsg.className = "error";
                return; // Bloqueia o salvamento
            }

            // Se o ID não existir, prossegue com a criação normal
            statusMsg.textContent = "ID disponível. Salvando dados...";
            
            await setDoc(docRef, {
                url_m3u: urlM3uValue
            });

            statusMsg.textContent = "Sucesso! Dispositivo salvo.";
            statusMsg.className = "success";
            
            // Limpa os campos após o sucesso
            document.getElementById('url-m3u').value = "";
            document.getElementById('doc-id').value = "";
            
        } catch (error) {
            console.error(error);
            statusMsg.textContent = "Erro ao processar dados. Verifique o console.";
            statusMsg.className = "error";
        }
    });
</script>
